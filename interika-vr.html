<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Interika · Recorrido 360</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Montserrat:wght@300;400;500&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* Paleta de Colores: TEMA CLARO (Blanco/Negro) */
    :root {
      --fondo: #f5f2ee;       /* Blanco/Hueso para el fondo */
      --texto: #09090b;       /* Negro para las letras */
      --acento: #09090b;      /* Negro para los botones */
      --texto-boton: #f5f2ee; /* Blanco para las letras de los botones */
      --borde: rgba(9, 9, 11, 0.15);
    }

    body, html { 
      width: 100%; height: 100%; overflow: hidden; 
      background: var(--fondo); color: var(--texto);
      font-family: 'Montserrat', sans-serif; 
    }

    #panorama { width: 100%; height: 100%; }

    /* --- UI de Inicio (Splash Screen) --- */
    #ui-inicio {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--fondo);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 9999; transition: opacity 0.5s ease;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-style: italic;
      margin-bottom: 2rem; letter-spacing: 2px; color: var(--texto);
    }

    .btn-ingresar {
      background: var(--acento); color: var(--texto-boton);
      border: none; padding: 15px 40px; font-size: 1rem; font-family: 'Montserrat', sans-serif;
      font-weight: 500; letter-spacing: 2px; cursor: pointer; text-transform: uppercase;
      border-radius: 2px; transition: all 0.3s ease; display: none;
    }
    .btn-ingresar:active { transform: scale(0.95); }

    #loading-text { font-size: 0.9rem; letter-spacing: 1px; animation: pulse 1.5s infinite; color: var(--texto); }
    @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

    /* --- UI de Controles (Abajo) --- */
    #ui-controles {
      position: absolute; bottom: 30px; left: 0; width: 100%;
      display: none; justify-content: center; gap: 15px; z-index: 100; pointer-events: none;
    }

    .btn-control {
      background: var(--fondo); color: var(--texto);
      border: 1px solid var(--borde); padding: 12px 25px;
      font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 500;
      letter-spacing: 1px; cursor: pointer; border-radius: 40px; text-transform: uppercase;
      pointer-events: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: all 0.3s ease;
    }
    .btn-control:active { transform: scale(0.95); background: var(--acento); color: var(--texto-boton); }

    /* Ocultar botones nativos feos de Pannellum */
    .pnlm-controls-container { display: none !important; }
    .pnlm-load-box { display: none !important; }
    
    /* Estilo de los Hotspots (Puntos para cambiar de cuarto) */
    .custom-hotspot {
      width: 20px; height: 20px; background: var(--acento); border-radius: 50%;
      border: 3px solid var(--fondo); box-shadow: 0 0 10px rgba(0,0,0,0.3);
      cursor: pointer; transition: transform 0.2s;
    }
    .custom-hotspot:hover { transform: scale(1.2); }
  </style>
</head>
<body>

  <div id="ui-inicio">
    <div class="logo">Interika</div>
    <div id="loading-text">CARGANDO PROYECTO...</div>
    <button id="btn-entrar" class="btn-ingresar" onclick="entrar()">INGRESAR</button>
  </div>

  <div id="panorama"></div>

  <div id="ui-controles">
    <button class="btn-control" onclick="compartir()">COMPARTIR</button>
  </div>

  <script>
    let viewer;
    let datosProyecto;

    // 1. Obtener la ruta de Supabase
    const params = new URLSearchParams(window.location.search);
    const tourPath = params.get('tour') || 'Proyecto Demo/VR-360';
    const configUrl = "https://nnfsyqbijkygmkymcexu.supabase.co/storage/v1/object/public/interika-360/" + tourPath + "/config.json";

    // 2. Cargar el JSON maestro de Supabase
    fetch(configUrl)
      .then(res => {
        if (!res.ok) throw new Error("No encontrado");
        return res.json();
      })
      .then(data => {
        datosProyecto = data;
        cargarEscena(0); // Cargar la primera habitación (índice 0)
      })
      .catch(err => {
        console.error(err);
        document.getElementById('loading-text').innerText = "ERROR AL CARGAR PROYECTO";
      });

    // 3. Función para cargar el render en pantalla
    function cargarEscena(index) {
      const escenaInfo = datosProyecto.escenas[index];
      
      if (viewer) {
        viewer.destroy(); // Limpiar la escena anterior si estamos cambiando de cuarto
      }

      // Preparar los hotspots (si agregas más cuartos en tu JSON)
      let hotspotsConfig = [];
      if (escenaInfo.hotspots) {
        hotspotsConfig = escenaInfo.hotspots.map(hs => ({
          pitch: hs.pitch,
          yaw: hs.yaw,
          cssClass: 'custom-hotspot',
          createTooltipFunc: hotspotTooltip,
          createTooltipArgs: hs.label,
          clickHandlerFunc: () => cargarEscena(hs.destino) // Brincar de cuarto
        }));
      }

      // Iniciar el motor Pannellum
      viewer = pannellum.viewer('panorama', {
        "type": "equirectangular",
        "panorama": escenaInfo.imagen,
        "autoLoad": true,
        "showControls": false,
        "hotSpots": hotspotsConfig
      });

      // Mostrar el botón INGRESAR solo cuando la foto ya cargó
      viewer.on('load', () => {
        document.getElementById('loading-text').style.display = 'none';
        document.getElementById('btn-entrar').style.display = 'block';
      });
    }

    // Dibujar el nombre del cuarto al tocar el hotspot
    function hotspotTooltip(hotSpotDiv, args) {
      hotSpotDiv.classList.add('custom-tooltip');
      var span = document.createElement('span');
      span.innerHTML = args;
      hotSpotDiv.appendChild(span);
      span.style.width = span.scrollWidth - 20 + 'px';
      span.style.marginLeft = -(span.scrollWidth - hotSpotDiv.offsetWidth) / 2 + 'px';
      span.style.marginTop = -40 + 'px';
      span.style.position = 'absolute';
      span.style.background = 'var(--acento)';
      span.style.color = 'var(--fondo)';
      span.style.padding = '5px 10px';
      span.style.borderRadius = '4px';
      span.style.fontSize = '12px';
      span.style.fontFamily = 'Montserrat, sans-serif';
      span.style.pointerEvents = 'none';
    }

    // 4. Funciones de la Interfaz
    function entrar() {
      document.getElementById('ui-inicio').style.opacity = '0';
      setTimeout(() => { 
        document.getElementById('ui-inicio').style.display = 'none'; 
        document.getElementById('ui-controles').style.display = 'flex';
      }, 500);
    }

    function compartir() {
      const url = window.location.href;
      if (navigator.share) {
        navigator.share({ title: 'Interika · ' + (datosProyecto ? datosProyecto.nombre : '360'), url }).catch(()=>{});
      } else {
        navigator.clipboard.writeText(url);
        alert("Enlace copiado al portapapeles");
      }
    }
  </script>
</body>
</html>
}
</script>
</body>
</html>
