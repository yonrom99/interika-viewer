<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Interika · VR Free-Roam</title>

  <!-- Google Fonts: mismas que el visor AR hermano -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Babel Standalone para compilar JSX en el browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import map: React + Three + R3F + Drei desde esm.sh -->
  <script type="importmap">
  {
    "imports": {
      "react":                        "https://esm.sh/react@18.3.1",
      "react-dom":                    "https://esm.sh/react-dom@18.3.1",
      "react-dom/client":             "https://esm.sh/react-dom@18.3.1/client",
      "three":                        "https://esm.sh/three@0.165.0",
      "three/addons/":                "https://esm.sh/three@0.165.0/examples/jsm/",
      "@react-three/fiber":           "https://esm.sh/@react-three/fiber@8.17.6?deps=react@18.3.1,three@0.165.0",
      "@react-three/drei":            "https://esm.sh/@react-three/drei@9.109.2?deps=react@18.3.1,three@0.165.0,@react-three/fiber@8.17.6"
    }
  }
  </script>

  <style>
    /* ─── DESIGN SYSTEM (idéntico al visor AR hermano) ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --negro:  #0a0a0a;
      --blanco: #ffffff;
      --arena:  #ffffff;
      --arena2: #999999;
      --carbon: #1a1a1a;
      --vidrio: rgba(255,255,255,0.06);
      --borde:  rgba(255,255,255,0.25);
    }

    html, body, #root {
      height: 100%; width: 100%;
      overflow: hidden;
      background: var(--negro);
      font-family: 'Montserrat', sans-serif;
    }

    .font-display { font-family: 'Cormorant Garamond', serif; }
    .font-ui      { font-family: 'Montserrat', sans-serif; }

    /* ── Animaciones ── */
    @keyframes logoIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes parpadeo {
      0%,100% { opacity: 1; } 50% { opacity: 0.2; }
    }
    @keyframes girar {
      to { transform: rotate(360deg); }
    }
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes pulsar-crosshair {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 0.55; }
      50%      { transform: translate(-50%,-50%) scale(1.35); opacity: 1; }
    }

    /* ── Splash ── */
    .splash-logo-anim  { animation: logoIn 1.2s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-d1  { animation: logoIn 1.4s 0.2s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-d2  { animation: logoIn 1.4s 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-d3  { animation: logoIn 1.6s 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-d4  { animation: logoIn 1.6s 0.8s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-d5  { animation: logoIn 1.8s 1.0s cubic-bezier(0.16,1,0.3,1) both; }
    .anim-d6  { animation: logoIn 2.0s 1.2s cubic-bezier(0.16,1,0.3,1) both; }

    /* ── Botón splash (clon exacto del AR) ── */
    .splash-btn {
      margin-top: 48px;
      padding: 14px 40px;
      background: transparent;
      border: 1px solid var(--arena);
      color: var(--arena);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s ease;
      position: relative; overflow: hidden;
      animation: logoIn 1.8s 1s cubic-bezier(0.16,1,0.3,1) both;
    }
    .splash-btn::before {
      content: ''; position: absolute; inset: 0;
      background: var(--arena); transform: translateX(-100%);
      transition: transform 0.3s ease; z-index: -1;
    }
    .splash-btn:hover::before { transform: translateX(0); }
    .splash-btn:hover { color: var(--negro); }

    /* ── Botones footer (clon exacto del AR) ── */
    .btn-primario {
      flex: 1; padding: 14px 12px;
      background: var(--arena); border: none; color: var(--negro);
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primario:hover { background: var(--blanco); }
    .btn-primario:disabled { opacity: 0.4; cursor: default; }

    .btn-secundario {
      flex: 1; padding: 14px 12px;
      background: transparent; border: 1px solid var(--borde); color: var(--blanco);
      font-family: 'Montserrat', sans-serif; font-size: 9px; font-weight: 300;
      letter-spacing: 0.25em; text-transform: uppercase;
      cursor: pointer; transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-secundario:hover { border-color: var(--arena); color: var(--arena); }

    /* ── Nav tabs ── */
    .nav-tab {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      padding: 8px 16px; cursor: pointer; transition: all 0.25s ease;
      font-family: 'Montserrat', sans-serif; font-size: 7px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--arena2);
      background: transparent; border: none; flex: 1;
      border-top: 1px solid transparent;
    }
    .nav-tab:hover { color: rgba(255,255,255,0.7); }
    .nav-tab.activo {
      color: var(--blanco);
      border-top-color: var(--arena);
    }

    /* ── Spinner ── */
    .spinner {
      width: 40px; height: 40px;
      border: 1px solid var(--borde); border-top-color: var(--arena);
      border-radius: 50%; animation: girar 1.2s linear infinite;
    }

    /* ── Barra de carga ── */
    .barra-carga {
      position: fixed; bottom: 0; left: 0; height: 1px;
      background: var(--arena); transition: width 0.3s ease; z-index: 200;
    }

    /* ── Dot parpadeante (badge activo) ── */
    .dot-vr {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--arena); animation: parpadeo 1.5s ease infinite;
      flex-shrink: 0;
    }

    /* ── Crosshair ── */
    .crosshair {
      position: fixed; top: 50%; left: 50%;
      width: 18px; height: 18px; pointer-events: none; z-index: 40;
      animation: pulsar-crosshair 2s ease infinite;
    }
    .crosshair::before, .crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.65);
    }
    .crosshair::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
    .crosshair::after  { height: 1px; width: 100%; top: 50%; transform: translateY(-50%); }

    /* ── Canvas Three.js ── */
    canvas { display: block; }

    /* ── Overlay fade ── */
    .overlay-ui {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      animation: fadeIn 0.6s ease both;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { Suspense, useRef, useState, useEffect, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Canvas, useFrame, useThree } from '@react-three/fiber';
    import { useGLTF, PointerLockControls, ContactShadows, Environment } from '@react-three/drei';
    import * as THREE from 'three';

    /* ───── Utilidades ───── */
    const getParam = (n) => new URLSearchParams(window.location.search).get(n);

    /* ───── SVGs inline (reemplazando lucide-react) ───── */
    const IconNav = () => (
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
      </svg>
    );
    const IconShare = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/>
        <polyline points="16 6 12 2 8 6"/>
        <line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    );
    const IconAR = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    );
    const Icon360 = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/>
        <path d="M12 2a15.3 15.3 0 010 20"/>
        <path d="M12 2a15.3 15.3 0 000 20"/>
      </svg>
    );
    const IconMouse = () => (
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="1.2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="5" y="2" width="14" height="20" rx="7"/>
        <line x1="12" y1="6" x2="12" y2="10"/>
      </svg>
    );

    /* ───── Logo SVG Interika ───── */
    const LogoGrande = () => (
      <svg style={{ width: 160, marginBottom: 40 }} viewBox="0 0 230 40" fill="none">
        <text x="0" y="30" fontFamily="Cormorant Garamond, serif" fontSize="26"
              fontWeight="300" fill="#ffffff" letterSpacing="10">INTERIKA</text>
      </svg>
    );
    const LogoPequeno = () => (
      <svg style={{ height: 28, opacity: 0.9 }} viewBox="0 0 200 30" fill="none">
        <text x="0" y="22" fontFamily="Cormorant Garamond, serif" fontSize="18"
              fontWeight="300" fill="#ffffff" letterSpacing="6">INTERIKA</text>
      </svg>
    );

    /* ─────────────────────────────────────────────
       Componente: Modelo GLB
    ───────────────────────────────────────────── */
    function Modelo({ url }) {
      const { scene } = useGLTF(url);
      useEffect(() => {
        scene.traverse((n) => {
          if (n.isMesh) { n.castShadow = true; n.receiveShadow = true; }
        });
      }, [scene]);
      return <primitive object={scene} />;
    }

    /* ─────────────────────────────────────────────
       Componente: Controles First-Person (WASD)
    ───────────────────────────────────────────── */
    function ControlsFPS({ onLock, onUnlock }) {
      const { camera } = useThree();
      const ctrlRef = useRef();
      const keys    = useRef({});
      const vel     = useRef(new THREE.Vector3());

      useEffect(() => {
        const dn = (e) => { keys.current[e.code] = true; };
        const up = (e) => { keys.current[e.code] = false; };
        window.addEventListener('keydown', dn);
        window.addEventListener('keyup',   up);
        return () => { window.removeEventListener('keydown', dn); window.removeEventListener('keyup', up); };
      }, []);

      useFrame((_, dt) => {
        if (!ctrlRef.current?.isLocked) return;
        const k = keys.current;
        const fwd  = k['KeyW'] || k['ArrowUp']    ? 1 : 0;
        const back = k['KeyS'] || k['ArrowDown']  ? 1 : 0;
        const left = k['KeyA'] || k['ArrowLeft']  ? 1 : 0;
        const rght = k['KeyD'] || k['ArrowRight'] ? 1 : 0;
        const spd  = 5 * dt;

        vel.current.z = (back - fwd)  !== 0 ? (back - fwd) * spd  : vel.current.z * 0.82;
        vel.current.x = (rght - left) !== 0 ? (rght - left) * spd : vel.current.x * 0.82;

        ctrlRef.current.moveRight(vel.current.x);
        ctrlRef.current.moveForward(-vel.current.z);
        camera.position.y = 1.7;
      });

      return <PointerLockControls ref={ctrlRef} onLock={onLock} onUnlock={onUnlock} />;
    }

    /* ─────────────────────────────────────────────
       Componente: Escena 3D
    ───────────────────────────────────────────── */
    function Escena({ modeloURL, onLock, onUnlock }) {
      return (
        <>
          <ambientLight intensity={0.55} />
          <directionalLight position={[10, 20, 10]} intensity={1.1} castShadow
            shadow-mapSize={[2048, 2048]}
            shadow-camera-far={100} shadow-camera-left={-20}
            shadow-camera-right={20} shadow-camera-top={20} shadow-camera-bottom={-20}
          />
          <hemisphereLight args={['#ffffff', '#1a1a1a', 0.35]} />
          <Environment preset="apartment" background={false} />

          {/* Suelo infinito oscuro — evita caída al vacío */}
          <mesh rotation={[-Math.PI / 2, 0, 0]} receiveShadow>
            <planeGeometry args={[500, 500]} />
            <meshStandardMaterial color="#080808" roughness={1} />
          </mesh>

          <ContactShadows position={[0, 0.01, 0]} opacity={0.35} scale={40} blur={2} far={10} />

          <Suspense fallback={null}>
            <Modelo url={modeloURL} />
          </Suspense>

          <ControlsFPS onLock={onLock} onUnlock={onUnlock} />
        </>
      );
    }

    /* ─────────────────────────────────────────────
       COMPONENTE PRINCIPAL
    ───────────────────────────────────────────── */
    function InterikaVR() {
      const nombre   = getParam('nombre') || 'Casa Prisma';
      const modelURL = getParam('modelo') || 'https://modelviewer.dev/shared-assets/models/Astronaut.glb';

      const [fase,    setFase]    = useState('splash');   // splash | cargando | visor
      const [locked,  setLocked]  = useState(false);
      const [copied,  setCopied]  = useState(false);
      const [barraW,  setBarraW]  = useState(0);

      /* Simular progreso al cargar la escena */
      useEffect(() => {
        if (fase !== 'cargando') return;
        let p = 0;
        const iv = setInterval(() => {
          p += Math.random() * 15;
          if (p >= 88) { p = 88; clearInterval(iv); }
          setBarraW(p);
        }, 280);
        const t = setTimeout(() => {
          setBarraW(100);
          setTimeout(() => { setFase('visor'); setBarraW(0); }, 420);
        }, 1900);
        return () => { clearInterval(iv); clearTimeout(t); };
      }, [fase]);

      const compartir = useCallback(async () => {
        const d = { title: `Interika · ${nombre}`, text: 'Explora este proyecto en VR', url: window.location.href };
        if (navigator.share) { try { await navigator.share(d); } catch(_) {} }
        else {
          try { await navigator.clipboard.writeText(window.location.href); } catch(_) {}
          setCopied(true); setTimeout(() => setCopied(false), 2200);
        }
      }, [nombre]);

      /* ── SPLASH ── */
      if (fase === 'splash') return (
        <div style={{
          position: 'fixed', inset: 0, background: 'var(--negro)',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
        }}>
          <div className="splash-logo-anim"><LogoGrande /></div>

          <p className="anim-d1 font-ui" style={{
            fontSize: 'clamp(26px,7vw,40px)', fontWeight: 200, color: 'var(--blanco)',
            letterSpacing: '0.18em', textTransform: 'uppercase', textAlign: 'center',
          }}>VR Free-Roam</p>

          <p className="anim-d2 font-ui" style={{
            fontSize: 10, fontWeight: 300, color: 'var(--arena)',
            letterSpacing: '0.35em', textTransform: 'uppercase', marginTop: 8,
          }}>Exploración de Primera Persona</p>

          {/* Línea decorativa — clon exacto del AR */}
          <div className="anim-d3" style={{
            width: 1, height: 60,
            background: 'linear-gradient(to bottom, transparent, #fff, transparent)',
            margin: '40px 0',
          }} />

          <div className="anim-d4" style={{ textAlign: 'center' }}>
            <p className="font-display" style={{
              fontSize: 'clamp(16px,5vw,22px)', fontWeight: 400,
              color: 'var(--blanco)', letterSpacing: '0.06em',
            }}>{nombre}</p>
            <p className="font-ui" style={{
              fontSize: 9, fontWeight: 300, color: 'var(--arena2)',
              letterSpacing: '0.4em', textTransform: 'uppercase', marginTop: 4,
            }}>Modelo arquitectónico · VR</p>
          </div>

          <button className="splash-btn anim-d5" onClick={() => setFase('cargando')}>
            Entrar al espacio
          </button>

          <p className="anim-d6 font-ui" style={{
            position: 'absolute',
            bottom: 'max(28px, env(safe-area-inset-bottom))',
            fontSize: 9, color: 'var(--arena2)',
            letterSpacing: '0.25em', textTransform: 'uppercase', textAlign: 'center',
          }}>Haz clic en la escena para activar los controles · Desktop</p>
        </div>
      );

      /* ── CARGANDO ── */
      if (fase === 'cargando') return (
        <div style={{
          position: 'fixed', inset: 0, background: 'var(--negro)',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
        }}>
          <div className="barra-carga" style={{ width: `${barraW}%` }} />
          <div className="spinner" style={{ marginBottom: 20 }} />
          <p className="font-ui" style={{
            fontSize: 9, fontWeight: 300, color: 'var(--arena2)',
            letterSpacing: '0.35em', textTransform: 'uppercase',
          }}>Compilando escena VR</p>
          <p className="font-ui" style={{
            fontSize: 8, color: '#555',
            letterSpacing: '0.2em', textTransform: 'uppercase', marginTop: 8,
          }}>{nombre}</p>
        </div>
      );

      /* ── VISOR VR ── */
      return (
        <div style={{ position: 'fixed', inset: 0, background: 'var(--negro)' }}>

          {/* Canvas Three.js */}
          <Canvas
            shadows
            camera={{ fov: 72, near: 0.05, far: 1000, position: [0, 1.7, 5] }}
            style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}
            gl={{ antialias: true, toneMapping: THREE.ACESFilmicToneMapping, toneMappingExposure: 0.9 }}
          >
            <Escena modeloURL={modelURL} onLock={() => setLocked(true)} onUnlock={() => setLocked(false)} />
          </Canvas>

          {/* Crosshair — solo cuando pointer está bloqueado */}
          {locked && <div className="crosshair" />}

          {/* ── HEADER ── */}
          <div className="overlay-ui">
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0,
              padding: 'max(20px, env(safe-area-inset-top)) 24px 20px',
              display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
              background: 'linear-gradient(to bottom, rgba(10,10,10,0.75) 0%, transparent 100%)',
            }}>
              <LogoPequeno />
              <div style={{ textAlign: 'right' }}>
                <p className="font-display" style={{
                  fontSize: 16, fontWeight: 400, color: 'var(--blanco)', letterSpacing: '0.04em',
                }}>{nombre}</p>
                <p className="font-ui" style={{
                  fontSize: 8, fontWeight: 300, color: 'var(--arena)',
                  letterSpacing: '0.35em', textTransform: 'uppercase', marginTop: 2,
                }}>VR Free-Roam</p>
              </div>
            </div>
          </div>

          {/* ── BADGE "VR ACTIVO" — clon del AR badge ── */}
          {locked && (
            <div style={{
              position: 'fixed',
              top: 'max(20px, env(safe-area-inset-top))',
              left: '50%', transform: 'translateX(-50%)',
              background: 'rgba(10,10,10,0.72)',
              border: '1px solid var(--borde)',
              padding: '8px 20px',
              display: 'flex', alignItems: 'center', gap: 8,
              zIndex: 30, pointerEvents: 'none',
              animation: 'fadeIn 0.3s ease both',
            }}>
              <div className="dot-vr" />
              <span className="font-ui" style={{
                fontSize: 9, fontWeight: 300, color: 'var(--blanco)',
                letterSpacing: '0.3em', textTransform: 'uppercase',
              }}>VR Activo · Interika</span>
            </div>
          )}

          {/* ── OVERLAY CENTRAL: instrucciones / clic para entrar ── */}
          {!locked && (
            <div
              onClick={() => document.querySelector('canvas')?.click()}
              style={{
                position: 'fixed', top: '50%', left: '50%',
                transform: 'translate(-50%, -50%)',
                zIndex: 20, cursor: 'pointer',
                animation: 'fadeIn 0.5s ease both',
              }}
            >
              <div style={{
                background: 'rgba(10,10,10,0.68)',
                border: '1px solid var(--borde)',
                padding: '28px 40px',
                display: 'flex', flexDirection: 'column',
                alignItems: 'center', gap: 14, textAlign: 'center',
              }}>
                <IconMouse />
                <p className="font-ui" style={{
                  fontSize: 11, fontWeight: 300, color: 'var(--blanco)',
                  letterSpacing: '0.15em', textTransform: 'uppercase',
                }}>Haz clic para caminar</p>

                <div style={{ width: 1, height: 18, background: 'rgba(255,255,255,0.12)' }} />

                {/* Teclas WASD */}
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                  <div style={{ display: 'flex', justifyContent: 'center' }}>
                    <Tecla k="W" />
                  </div>
                  <div style={{ display: 'flex', gap: 4 }}>
                    <Tecla k="A" />
                    <Tecla k="S" />
                    <Tecla k="D" />
                  </div>
                </div>
                <p className="font-ui" style={{
                  fontSize: 8, color: 'var(--arena2)',
                  letterSpacing: '0.2em', textTransform: 'uppercase',
                }}>W A S D · Mouse para mirar · ESC para salir</p>
              </div>
            </div>
          )}

          {/* Hint sutil cuando está en modo libre */}
          {locked && (
            <div style={{
              position: 'fixed', bottom: 160, left: '50%', transform: 'translateX(-50%)',
              pointerEvents: 'none', zIndex: 15,
            }}>
              <p className="font-ui" style={{
                fontSize: 8, color: 'rgba(255,255,255,0.28)',
                letterSpacing: '0.2em', textTransform: 'uppercase', textAlign: 'center',
                whiteSpace: 'nowrap',
              }}>ESC para salir · W A S D para moverte</p>
            </div>
          )}

          {/* ── FOOTER — clon estructural del AR ── */}
          <div style={{
            position: 'fixed', bottom: 0, left: 0, right: 0,
            padding: '20px 24px max(28px, env(safe-area-inset-bottom))',
            background: 'linear-gradient(to top, rgba(10,10,10,0.88) 0%, transparent 100%)',
            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0,
            zIndex: 10, pointerEvents: 'all',
          }}>

            {/* Tab bar de navegación */}
            <div style={{
              display: 'flex', width: '100%', maxWidth: 360,
              borderTop: '1px solid rgba(255,255,255,0.08)',
              marginBottom: 14,
            }}>
              <button className="nav-tab font-ui" title="Visor AR">
                <IconAR />
                AR Model
              </button>
              <button className="nav-tab font-ui" title="VR 360"
                style={{ borderLeft: '1px solid rgba(255,255,255,0.08)' }}>
                <Icon360 />
                VR 360
              </button>
              {/* Free-Roam ACTIVO */}
              <button className="nav-tab activo font-ui" title="Free-Roam"
                style={{ borderLeft: '1px solid rgba(255,255,255,0.08)' }}>
                <IconNav />
                Free-Roam
              </button>
            </div>

            {/* Hint dinámico — mismo estilo que el AR */}
            <p className="font-ui" style={{
              fontSize: 'clamp(7px,2.2vw,9px)', fontWeight: 300,
              color: 'var(--arena2)', letterSpacing: '0.15em',
              textTransform: 'uppercase', textAlign: 'center',
              width: '100%', whiteSpace: 'nowrap', marginBottom: 16,
            }}>
              {locked
                ? 'Mueve el mouse para mirar · W A S D para caminar · ESC para salir'
                : 'Haz clic en la escena para activar los controles de primera persona'}
            </p>

            {/* Botones de acción — mismo layout que el AR */}
            <div style={{ display: 'flex', gap: 12, width: '100%', maxWidth: 360 }}>
              <button
                className="btn-primario"
                onClick={() => document.querySelector('canvas')?.click()}
              >
                <IconNav />
                {locked ? 'Modo activo' : 'Caminar'}
              </button>
              <button className="btn-secundario" onClick={compartir}>
                <IconShare />
                {copied ? '¡Copiado!' : 'Compartir'}
              </button>
            </div>
          </div>

        </div>
      );
    }

    /* ── Tecla decorativa para el modal de instrucciones ── */
    function Tecla({ k }) {
      return (
        <div style={{
          width: 30, height: 30,
          border: '1px solid var(--borde)',
          background: 'rgba(255,255,255,0.06)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          margin: 2,
        }}>
          <span className="font-ui" style={{
            fontSize: 10, fontWeight: 500,
            color: 'var(--arena2)', letterSpacing: '0.05em',
          }}>{k}</span>
        </div>
      );
    }

    /* ── Montar la app ── */
    createRoot(document.getElementById('root')).render(<InterikaVR />);
  </script>
</body>
</html>
